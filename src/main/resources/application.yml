server:
  port: 8080

spring:
  application:
    name: stockly-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stockly}
    username: ${DB_USER:stockly}
    password: ${DB_PASSWORD:stockly123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:c3RvY2tseS1zdXBlci1zZWNyZXQta2V5LXBhcmEtand0LXRva2Vucy1zZWd1cmFuY2E=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.stockly.api: INFO
